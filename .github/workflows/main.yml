name: CI

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    # Weekly run against latest runner image / apt packages / python-apt HEAD
    # to catch drift even when nothing in this repo has changed.
    - cron: '11 4 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      OPENREPO_VAR_DIR: /tmp/openrepo/

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            createrepo-c \
            gpg \
            libapt-pkg-dev \
            libpq-dev \
            python3-dev \
            python3-pip \
            python3-venv

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: pip install -r web/requirements.txt

      - name: Prepare var directory
        run: mkdir -p /tmp/openrepo/packages /tmp/openrepo/keyring /tmp/openrepo/www /tmp/openrepo/rpmcache

      - name: Run tests
        working-directory: web
        run: python manage.py test repo.tests --verbosity=2

  cli-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CLI dependencies
        working-directory: cli
        run: pip install -r requirements.txt

      - name: Run CLI tests
        working-directory: cli
        run: PYTHONPATH=. python tests/test_cli.py
